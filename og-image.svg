<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="40" cy="642" r="60" fill="#6d28d9" opacity="0.12"/>
    <circle cx="821" cy="15" r="22" fill="#6d28d9" opacity="0.11"/>
    <circle cx="1010" cy="719" r="84" fill="#6d28d9" opacity="0.18"/>
    <circle cx="1229" cy="127" r="28" fill="#6d28d9" opacity="0.10"/>
    <circle cx="219" cy="51" r="35" fill="#6d28d9" opacity="0.06"/>
    <circle cx="666" cy="-14" r="45" fill="#6d28d9" opacity="0.11"/>
    <rect x="57" y="586" width="66" height="39" rx="8" fill="#7c3aed" opacity="0.11" transform="rotate(6, 653, 667)"/>
    <rect x="850" y="-72" width="70" height="74" rx="8" fill="#7c3aed" opacity="0.15" transform="rotate(26, 21, 394)"/>
    <rect x="-50" y="340" width="20" height="95" rx="8" fill="#7c3aed" opacity="0.05" transform="rotate(21, 781, 87)"/>
    <rect x="1227" y="660" width="97" height="23" rx="8" fill="#7c3aed" opacity="0.12" transform="rotate(12, 633, 503)"/>
    <rect x="968" y="557" width="27" height="28" rx="8" fill="#7c3aed" opacity="0.05" transform="rotate(2, 539, -1)"/>
    <rect x="314" y="540" width="99" height="82" rx="8" fill="#7c3aed" opacity="0.11" transform="rotate(11, 1209, 604)"/>
    <rect x="969" y="56" width="45" height="22" rx="8" fill="#7c3aed" opacity="0.11" transform="rotate(8, -51, 487)"/>
    <rect x="824" y="264" width="85" height="31" rx="8" fill="#7c3aed" opacity="0.11" transform="rotate(10, 203, 42)"/>
    <polygon points="350,420 374,468 326,468" fill="#6d28d9" opacity="0.10"/>
    <polygon points="66,621 124,737 8,737" fill="#6d28d9" opacity="0.11"/>
    <polygon points="1050,472 1115,602 985,602" fill="#6d28d9" opacity="0.04"/>
    <polygon points="124,103 199,253 49,253" fill="#6d28d9" opacity="0.12"/>

  <!-- Wave at bottom -->
  <path d="M0,574 C360,602 840,546 1200,574 L1200,630 L0,630Z" fill="#6d28d9" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    Jiyugaoka cafe 안내
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
    Jiyugaoka — 정보
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#f472b6" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#f472b6" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
    Jiyugaoka Jiyugaoka cafe 안내 — 정보
  </text>
</svg>